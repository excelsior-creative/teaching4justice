 filter: brightness(1.2) opacity(.8);
}
body .elementor-element.secondary .elementor-button {
 background-color:  var(--e-global-color-secondary);
}
body .elementor-element.accent .elementor-button {
 background-color:  var(--e-global-color-accent);
}
/* stroke buttons */
body .elementor-element.stroke .elementor-button {
 border-color: var(--e-global-color-primary);
 background-color: transparent;
 color: var(--e-global-color-primary);
}
body .elementor-element.stroke .elementor-button:hover {
 background-color: var(--e-global-color-primary);
 color: white;
}
body .elementor-element.stroke.secondary .elementor-button:hover {
 background-color: var(--e-global-color-secondary);
 color: white;
}
body .elementor-element.stroke.accent .elementor-button:hover {
 background-color: var(--e-global-color-accent);
 color: white;
}
body .elementor-element.stroke.secondary .elementor-button {
 border-color: var(--e-global-color-secondary);
 background-color: transparent;
 color: var(--e-global-color-secondary);
}
body .elementor-element.stroke.accent .elementor-button {
 border-color: var(--e-global-color-accent);
 background-color: transparent;
 color: var(--e-global-color-accent);
}
body .elementor-element.stroke.transparent .elementor-button {
 border-color: transparent;
}
/* links */
body .elementor a {
 text-decoration: underline;
}
body .elementor .elementor-nav-menu a,
body .elementor a.elementor-button,
body .elementor a:hover {
 text-decoration: none;
}
/* page transition */
body e-page-transition {
 backdrop-filter: blur(10px);
}/* End custom CSS */
